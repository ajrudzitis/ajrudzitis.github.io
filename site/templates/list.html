{% extends "base.html" %}

{% block title %}{{ category | title }} - {{ site.title }}{% endblock %}

{% block content %}
<div class="post-list">
    <h1>{{ category | title }}</h1>

    <table>
        <tr>
            <th>Date</th>
            <th>Title</th>
        </tr>
        {% for post in posts %}
        <tr>
            <td>
                {% if post.date %}{{ post.date }}{% endif %}
            </td>
            <td>
                <a href="{{ post.url }}">{{ post.frontmatter.title }}</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
