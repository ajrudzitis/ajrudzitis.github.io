<!DOCTYPE html>
<html lang="en" data-default-theme="{{ site.theme.default | default(value='minimalist') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.title }}{% endblock %}</title>
    <meta name="description" content="{{ site.description }}">

    <!-- Inline theme initialization to prevent flash -->
    <script>
        (function() {
            var theme = localStorage.getItem('site-theme') ||
                        document.documentElement.dataset.defaultTheme ||
                        'minimalist';
            document.documentElement.dataset.theme = theme;
            document.write('<link rel="stylesheet" href="/css/themes/' + theme + '.css" id="theme-css">');
        })();
    </script>
    <noscript>
        <link rel="stylesheet" href="/css/themes/{{ site.theme.default | default(value='minimalist') }}.css" id="theme-css">
    </noscript>

    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/terminal-egg.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header>
        <nav>
            <a href="/">Home</a>
            <a href="/articles/">Articles</a>
            <a href="/letters/">Letters</a>
            <a href="/bookshelf.html">Bookshelf</a>
            <a href="/haikus.html">Haikus</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; {{ site.author }}</p>
        <p>
            {% if site.social.github %}<a href="https://github.com/{{ site.social.github }}">GitHub</a>{% endif %}
            {% if site.social.linkedin %}<a href="https://linkedin.com/in/{{ site.social.linkedin }}">LinkedIn</a>{% endif %}
            {% if site.social.twitter %}<a href="https://twitter.com/{{ site.social.twitter }}">Twitter</a>{% endif %}
        </p>
    </footer>

    <script src="/js/theme.js"></script>
    <script src="/js/easter-eggs.js"></script>
    <script src="/js/terminal-egg.js"></script>
</body>
</html>
