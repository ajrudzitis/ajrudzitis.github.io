{% extends "base.html" %}

{% block title %}{{ page.frontmatter.title }} - {{ site.title }}{% endblock %}

{% block content %}
<article class="post">
    <header>
        <h1>{{ page.frontmatter.title }}</h1>
        {% if page.date %}
        <time datetime="{{ page.date }}">{{ page.date }}</time>
        {% endif %}
    </header>

    <div class="content">
        {{ page.html | safe }}
    </div>
</article>
{% endblock %}
